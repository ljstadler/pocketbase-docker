name: publish

on:
    workflow_dispatch:
    schedule:
        - cron: "0 */12 * * *"

jobs:
    check-version:
        runs-on: ubuntu-latest
        outputs:
            SHOULD_BUILD: ${{ steps.check-version.outputs.SHOULD_BUILD }}
            TAG: ${{ steps.check-version.outputs.TAG }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Check version
              id: check-version
              run: |
                  tag="$(wget -qO- https://api.github.com/repos/pocketbase/pocketbase/releases/latest | jq -r '.tag_name[1:]')"
                  if [ "$tag" != "$PB_VERSION" ]; then
                    gh variable set PB_VERSION -b $tag
                    echo "SHOULD_BUILD=true" >> $GITHUB_OUTPUT
                    echo "TAG=$tag" >> $GITHUB_OUTPUT
                  fi
              env:
                  GH_TOKEN: ${{ secrets.VAR_PAT }}
                  PB_VERSION: ${{ vars.PB_VERSION }}

    build-and-push-image:
        needs: check-version
        if: needs.check-version.outputs.SHOULD_BUILD == 'true'
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to ghcr.io
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  provenance: false
                  build-args: |
                      VERSION=${{ needs.check-version.outputs.TAG }}
                  tags: ghcr.io/${{ github.repository }}:latest,ghcr.io/${{ github.repository }}:${{ needs.check-version.outputs.TAG }}

            - name: ghcr.io cleanup
              uses: dataaxiom/ghcr-cleanup-action@v1
              with:
                  keep-n-tagged: 3
                  token: ${{ secrets.GITHUB_TOKEN }}
